<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand Drift Score Diagnostic</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" id="app" aria-live="polite">
      <section class="card" id="quizCard">
        <header class="card-header">
          <p class="kicker">Brand Soul Atelier</p>
          <h1>Brand Drift Score</h1>
          <p class="intro">
            A rapid strategic diagnostic designed to assess how aligned your positioning,
            messaging, and decisions remain over time.
          </p>
        </header>

        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <p class="progress-text" id="progressText">Question 1 of 9 · 11%</p>
        </div>

        <section id="questionView" class="question-view"></section>

        <footer class="actions">
          <button type="button" class="btn btn-secondary" id="backBtn">Back</button>
          <button type="button" class="btn btn-primary" id="nextBtn">Next</button>
        </footer>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
